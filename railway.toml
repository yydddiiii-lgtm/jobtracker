[build]
builder = "nixpacks"
watchPatterns = ["**"]

[service]
  name = "jobtracker"
  root = "."

  [service.build]
    nixpacks = { install = ["nodejs-20.x", "postgresql"] }
    buildCommand = """
      # 安装客户端依赖（包含devDependencies）
      cd client && npm install --include=dev
      # 构建前端
      npm run build
      # 安装服务器依赖（生产环境）
      cd ../server && npm ci --omit=dev
    """

  [service.deploy]
    start = """
      # 等待数据库就绪
      sleep 5
      # 运行数据库迁移
      node server/db/migrate.js
      # 启动应用
      node server.js
    """
    healthcheckPath = "/api/auth/me"
    healthcheckTimeout = 30

  [service.variables]
    PORT = "4000"
    NODE_ENV = "production"
    JWT_SECRET = { required = true }
    JWT_ACCESS_EXPIRES_IN = "2h"
    JWT_REFRESH_EXPIRES_IN = "7d"
    # PostgreSQL 连接字符串将由 Railway 插件自动提供
    DATABASE_URL = "postgresql://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}"
    # Redis 可选，暂时注释
    # REDIS_URL = "redis://${REDISHOST}:${REDISPORT}"

[plugins]
  [plugins.postgresql]
    type = "postgresql"
    version = "15"